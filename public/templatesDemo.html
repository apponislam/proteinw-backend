<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Email Templates Demo</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                max-width: 1200px;
                margin: 0 auto;
                padding: 20px;
                background-color: #f5f5f5;
            }
            h1 {
                text-align: center;
                color: #1a1a1a;
                margin-bottom: 40px;
            }
            .template-container {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(520px, 1fr));
                gap: 30px;
            }
            .template-card {
                background: white;
                border-radius: 12px;
                padding: 24px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            }
            .template-title {
                font-size: 18px;
                font-weight: bold;
                margin-bottom: 20px;
                color: #7c5800;
                border-bottom: 1px solid #f0f0f0;
                padding-bottom: 12px;
            }
            iframe {
                width: 100%;
                height: 540px;
                border: none;
                border-radius: 8px;
            }
        </style>
    </head>
    <body>
        <h1>Email Templates Demo</h1>

        <div class="template-container">
            <!-- Verification Email -->
            <div class="template-card">
                <div class="template-title">Verification Email (with OTP)</div>
                <iframe
                    srcdoc='
                <div style="font-family: Arial, sans-serif; max-width: 500px; margin: 0 auto; padding: 24px; background: white; border: 1px solid #f0f0f0; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
                    <h2 style="color: #1a1a1a; margin-top: 0;">Hello John Doe,</h2>
                    <p style="color: #4a4a4a; line-height: 1.6;">Please verify your email address by clicking the button below:</p>
                    <div style="text-align: center; margin: 32px 0;">
                        <a href="#" style="background: linear-gradient(to right, #7C5800, #FFB800); color: white; padding: 12px 30px; text-decoration: none; border-radius: 24px; display: inline-block; font-weight: 500; font-size: 14px;">Verify Email</a>
                    </div>
                    <p style="color: #8a8a8a; font-size: 12px; line-height: 1.6;">Or copy this link: <span style="word-break: break-all;">https://app.example.com/verify-email?token=abc123&email=john@example.com</span></p>
                    <div style="margin-top: 24px; padding: 16px; background: #fffaf0; border-radius: 8px; border: 1px solid #ffe8b8;">
                        <p style="color: #7C5800; font-size: 14px; text-align: center; margin: 0 0 8px 0;">Or enter this 6-digit code in the app:</p>
                        <p style="color: #1a1a1a; font-size: 32px; text-align: center; margin: 0; font-weight: bold; letter-spacing: 8px;">123456</p>
                        <p style="color: #8a8a8a; font-size: 12px; text-align: center; margin: 8px 0 0 0;">OTP expires in 10 minutes.</p>
                    </div>
                    <p style="color: #8a8a8a; font-size: 12px; margin-top: 24px;">This link expires in 24 hours.</p>
                </div>
            '
                ></iframe>
            </div>

            <!-- OTP Email -->
            <div class="template-card">
                <div class="template-title">OTP Email</div>
                <iframe
                    srcdoc='
                <div style="font-family: Arial, sans-serif; max-width: 420px; margin: 0 auto; padding: 24px; background: white; border: 1px solid #f0f0f0; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
                    <h2 style="color: #1a1a1a; margin-top: 0;">Hello Jane Smith,</h2>
                    <p style="color: #4a4a4a; line-height: 1.6;">Your OTP code is:</p>
                    <div style="background: #fffaf0; border: 1px solid #ffe8b8; padding: 20px; text-align: center; margin: 24px 0; border-radius: 12px;">
                        <div style="font-size: 36px; font-weight: bold; letter-spacing: 10px; color: #1a1a1a;">
                            654321
                        </div>
                    </div>
                    <p style="color: #8a8a8a; font-size: 12px;">This code expires in 10 minutes.</p>
                </div>
            '
                ></iframe>
            </div>

            <!-- Welcome Email -->
            <div class="template-card">
                <div class="template-title">Welcome Email</div>
                <iframe
                    srcdoc='
                <div style="font-family: Arial, sans-serif; max-width: 520px; margin: 0 auto; padding: 0; background: white; border: 1px solid #f0f0f0; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden;">
                    <div style="background: linear-gradient(135deg, #7C5800 0%, #FFB800 100%); padding: 32px 24px; text-align: center;">
                        <h1 style="color: white; margin: 0; font-size: 28px; font-weight: bold;">Welcome to ProteinW!</h1>
                        <p style="color: rgba(255,255,255,0.9); margin: 12px 0 0 0; font-size: 15px;">We are excited to have you on board</p>
                    </div>
                    <div style="padding: 32px 28px;">
                        <h2 style="color: #1a1a1a; margin: 0 0 16px 0; font-size: 22px;">Hello Alex Johnson,</h2>
                        <p style="color: #4a4a4a; line-height: 1.8; margin: 0 0 24px 0; font-size: 15px;">Thank you for joining us! We are thrilled to have you become a part of our community and can't wait for you to get started.</p>
                        
                        <p style="color: #8a8a8a; font-size: 13px; line-height: 1.7; margin: 24px 0 0 0;">If you have any questions, feel free to reach out to our support team. We are here to help!</p>
                    </div>
                    <div style="background: #fafafa; padding: 20px 28px; text-align: center; border-top: 1px solid #f0f0f0;">
                        <p style="color: #8a8a8a; margin: 0; font-size: 12px;">© 2026 ProteinW. All rights reserved.</p>
                    </div>
                </div>
            '
                ></iframe>
            </div>

            <!-- Email Update Verification -->
            <div class="template-card">
                <div class="template-title">Email Update Verification</div>
                <iframe
                    srcdoc='
                <div style="font-family: Arial, sans-serif; max-width: 500px; margin: 0 auto; padding: 24px; background: white; border: 1px solid #f0f0f0; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
                    <h2 style="color: #1a1a1a; margin-top: 0;">Hello Sam Wilson,</h2>
                    <p style="color: #4a4a4a; line-height: 1.6;">Please verify your new email address by clicking the button below:</p>
                    <div style="text-align: center; margin: 32px 0;">
                        <a href="#" style="background: linear-gradient(to right, #7C5800, #FFB800); color: white; padding: 12px 30px; text-decoration: none; border-radius: 24px; display: inline-block; font-weight: 500; font-size: 14px;">Verify New Email</a>
                    </div>
                    <p style="color: #8a8a8a; font-size: 12px;">This link expires in 24 hours.</p>
                </div>
            '
                ></iframe>
            </div>

            <!-- Group Invitation Email -->
            <div class="template-card">
                <div class="template-title">Group Invitation Email</div>
                <iframe
                    srcdoc='
                <div style="font-family: Arial, sans-serif; max-width: 500px; margin: 0 auto; padding: 24px; background: white; border: 1px solid #f0f0f0; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
                    <h2 style="color: #1a1a1a; margin-top: 0;">Hello,</h2>
                    <p style="color: #4a4a4a; line-height: 1.6;">You have been invited to join the group: <strong style="color: #7C5800;">Summer Solstice 2025</strong>.</p>
                    <p style="color: #4a4a4a; line-height: 1.6;">Please register using the button below to accept the invitation:</p>
                    <div style="text-align: center; margin: 32px 0;">
                        <a href="https://fundraising.apponislam.top/auth/member?email=akdfaks@gmail.com" style="background: linear-gradient(to right, #7C5800, #FFB800); color: white; padding: 12px 30px; text-decoration: none; border-radius: 24px; display: inline-block; font-weight: 500; font-size: 14px;">Join Group</a>
                    </div>
                    <p style="color: #8a8a8a; font-size: 12px; line-height: 1.6;">Or copy this link: <span style="word-break: break-all;">https://fundraising.apponislam.top/auth/member?email=akdfaks@gmail.com</span></p>
                </div>
            '
                ></iframe>
            </div>
        </div>
    </body>
</html>
